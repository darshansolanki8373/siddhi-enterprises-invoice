databases:
  - name: siddhi-db
    plan: free
    databaseName: siddhi_enterprises
    user: siddhi

services:
  - type: web
    plan: free
    name: siddhi-enterprises
    runtime: node
    buildCommand: npm install
    startCommand: node server-pg.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: siddhi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
