<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Siddhi Collection</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <i class="fas fa-rupee-sign"></i>
      </div>
      <h1>Siddhi Collection</h1>
      <p class="login-subtitle">Payment Collection App</p>
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary btn-full">Login</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="appScreen" class="screen">

    <!-- Top Bar -->
    <header class="topbar">
      <h2>Collection</h2>
      <button id="btnLogout" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <!-- Filters -->
    <div class="filters-bar">
      <select id="filterCustomer">
        <option value="">All Customers</option>
      </select>
      <input type="date" id="filterFrom" placeholder="From">
      <input type="date" id="filterTo" placeholder="To">
      <button id="btnApplyFilter" class="btn-sm btn-primary">Go</button>
    </div>

    <!-- Summary Cards -->
    <div class="summary-cards">
      <div class="card summary-total">
        <div class="card-label">Total Pending</div>
        <div class="card-value" id="summaryTotal">₹0</div>
      </div>
      <div class="card summary-count">
        <div class="card-label">Customers</div>
        <div class="card-value" id="summaryCount">0</div>
      </div>
    </div>

    <!-- Customer List -->
    <div id="customerList" class="customer-list"></div>

    <!-- Customer Detail (invoices) -->
    <div id="customerDetail" class="detail-view hidden">
      <button id="btnBack" class="btn-back"><i class="fas fa-arrow-left"></i> Back</button>
      <div id="detailHeader" class="detail-header"></div>
      <div id="invoiceList" class="invoice-list"></div>
    </div>

  </div>

  <!-- Payment Modal -->
  <div id="paymentModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Record Payment</h3>
        <button class="modal-close" id="btnCloseModal"><i class="fas fa-times"></i></button>
      </div>
      <div id="paymentInfo" class="payment-info"></div>
      <div class="payment-options">
        <div class="input-group">
          <i class="fas fa-calendar"></i>
          <input type="date" id="paymentDate">
        </div>
        <button class="btn-primary btn-full" id="btnMarkFull">Pay Full Amount</button>
        <div class="divider"><span>or</span></div>
        <div class="input-group">
          <i class="fas fa-rupee-sign"></i>
          <input type="number" id="partialAmount" placeholder="Enter partial amount" min="1" step="0.01">
        </div>
        <button class="btn-secondary btn-full" id="btnPayPartial">Pay Partial Amount</button>
      </div>
    </div>
  </div>

  <!-- Invoice View Modal -->
  <div id="invoiceModal" class="modal hidden">
    <div class="modal-content modal-full">
      <div class="modal-header">
        <h3>Invoice Details</h3>
        <button class="modal-close" id="btnCloseInvoice"><i class="fas fa-times"></i></button>
      </div>
      <div id="invoiceDetail"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
